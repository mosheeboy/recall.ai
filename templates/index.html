<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recall.ai</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">    
</head>
<body>
    <!-- Fact Carousel as a Top Header -->
    <div class="fact-carousel">
        <div class="fact-carousel-inner">
            <span id="fact-display">Loading facts...</span>
        </div>
    </div>

    <div class="wrapper">
        <header class="hero">
            <div class="container">
                <h1>Recall.ai</h1>
                <div class="subtitle">
                    <span class="subtitle-part1">Recall More, </span>
                    <span class="subtitle-part2">Study Less</span>
                </div>
            </div>
        </header>
        
        <main>
            <div class="container">
                <div class="features">
                    <div class="feature">
                        <div class="feature-icon">
                            <img src="{{ url_for('static', filename='images/smart-learning.png') }}" alt="Smart Learning Icon">
                        </div>
                        <h3>Smart Learning</h3>
                        <p>AI-powered tutoring<br>tailored to your syllabus</p>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">
                            <img src="{{ url_for('static', filename='images/timer.png') }}" alt="Timer Icon">
                        </div>
                        <h3>Time Management</h3>
                        <p>Built-in Pomodoro timer for<br>focused study sessions</p>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">
                            <img src="{{ url_for('static', filename='images/progress.png') }}" alt="Progress Icon">
                        </div>
                        <h3>Progress Tracking</h3>
                        <p>Track your understanding<br>with interactive quizzes</p>
                    </div>
                </div>
                <div class="upload-wrapper">
                    <form action="{{ url_for('upload_syllabus') }}" method="post" enctype="multipart/form-data">
                        <label class="custom-file-upload">
                            <input type="file" id="syllabus" name="file" accept=".pdf, .docx, .txt" required onchange="showSubmit(this)">
                            <span id="button-text">Upload Your Syllabus</span>
                        </label>
                        <div id="submit-container" class="hidden">
                            <button type="submit" class="proceed-button">
                                <span class="proceed-text">Begin Study Session</span>
                                <span class="proceed-icon">→</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer moved outside wrapper -->
    <footer>
        <p>© 2024 Recall.ai. All Rights Reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
